name: Python Tests
on:
  workflow_call:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: ./.github/actions/setup-python
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: ./.github/actions/cache
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: bash
        run: |
          uv pip install --system -e ".[dev,mcp,modelscope,paroquant]"
          uv pip install --system pytest-xdist pytest-cov

      - name: Run Pytest Suite with Coverage
        shell: bash
        run: |
          # Use pytest-xdist for parallel test execution where appropriate, deselecting slow/integration by default
          pytest -n auto --cov=omlx --cov-report=xml --cov-report=json --cov-report=html:htmlcov tests/

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage.json
            htmlcov/
          retention-days: 14
