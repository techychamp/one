name: Documentation Validation
on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          pip install pytest

      - name: Run Documentation Validation Tests
        shell: bash
        run: |
          pytest -v tests/test_docs.py tests/test_docs_validation.py
